<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="SOPs and internal docs thumbnail">
  <defs>
    <linearGradient id="sopbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="480" height="240" fill="url(#sopbg)"/>

  <!-- Glows -->
  <circle cx="80" cy="60" r="80" fill="#818cf8" opacity="0.15"/>
  <circle cx="420" cy="200" r="100" fill="#6366f1" opacity="0.12"/>

  <!-- Stack of documents -->
  <g transform="translate(120 40)">
    <!-- Back doc -->
    <g transform="translate(40 18) rotate(-6)">
      <rect width="180" height="160" rx="8" fill="#cbd5e1" opacity="0.6"/>
    </g>
    <!-- Middle doc -->
    <g transform="translate(20 8) rotate(-2)">
      <rect width="180" height="160" rx="8" fill="#e2e8f0" opacity="0.85"/>
    </g>
    <!-- Front doc -->
    <g>
      <rect width="200" height="170" rx="10" fill="url(#paper)" stroke="#818cf8" stroke-opacity="0.5"/>
      <!-- Header bar -->
      <rect x="16" y="18" width="120" height="10" rx="5" fill="#1e1b4b"/>
      <rect x="16" y="34" width="160" height="6" rx="3" fill="#6366f1" opacity="0.6"/>
      <!-- Lines -->
      <rect x="16" y="58" width="168" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
      <rect x="16" y="70" width="148" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
      <rect x="16" y="82" width="156" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
      <rect x="16" y="94" width="120" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
      <!-- Section header -->
      <rect x="16" y="112" width="80" height="7" rx="3.5" fill="#4338ca"/>
      <!-- More lines -->
      <rect x="16" y="128" width="160" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
      <rect x="16" y="140" width="140" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
      <!-- Bullet -->
      <circle cx="22" cy="156" r="2.5" fill="#6366f1"/>
      <rect x="32" y="153" width="100" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
    </g>
  </g>

  <!-- Edit pencil badge -->
  <g transform="translate(376 168)">
    <circle r="22" fill="#818cf8"/>
    <path d="M-7 7 L7 -7 L10 -4 L-4 10 Z" fill="#1e1b4b"/>
    <path d="M-7 7 L-9 9 L-5 11 L-4 10 Z" fill="#1e1b4b"/>
  </g>

  <!-- Label -->
  <text x="30" y="28" fill="#a5b4fc" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">SOPs · INTERNAL DOCS</text>
</svg>
