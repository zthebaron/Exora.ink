<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="Batch Image Enhancer thumbnail">
  <defs>
    <linearGradient id="bebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F1D04"/>
      <stop offset="100%" stop-color="#1F0F02"/>
    </linearGradient>
    <linearGradient id="dullCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brightCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="brightCard2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <rect width="480" height="240" fill="url(#bebg)"/>
  <circle cx="100" cy="60" r="80" fill="#F59E0B" opacity="0.10"/>
  <circle cx="380" cy="180" r="100" fill="#0EA5E9" opacity="0.10"/>

  <!-- Three "before" thumbnails on the left, dull -->
  <g transform="translate(40 70)">
    <rect width="80" height="60" rx="6" fill="url(#dullCard)" stroke="#475569" stroke-opacity="0.5"/>
    <circle cx="40" cy="30" r="14" fill="#475569"/>
    <rect x="20" y="48" width="40" height="4" rx="2" fill="#475569"/>
  </g>
  <g transform="translate(40 145)">
    <rect width="80" height="60" rx="6" fill="url(#dullCard)" stroke="#475569" stroke-opacity="0.5"/>
    <rect x="14" y="14" width="52" height="32" rx="3" fill="#374151"/>
    <line x1="20" y1="22" x2="60" y2="22" stroke="#475569" stroke-width="1"/>
    <line x1="20" y1="30" x2="50" y2="30" stroke="#475569" stroke-width="1"/>
  </g>

  <!-- Sparkle/wand in middle -->
  <g transform="translate(180 130)">
    <circle r="36" fill="url(#brightCard)" opacity="0.95"/>
    <g transform="scale(1.2)">
      <path d="M0 -14 L3 -4 L13 -2 L3 0 L0 12 L-3 0 L-13 -2 L-3 -4 Z" fill="white"/>
      <circle cx="-18" cy="-16" r="2.5" fill="white"/>
      <circle cx="20" cy="14" r="2" fill="white"/>
      <circle cx="22" cy="-14" r="1.6" fill="white"/>
    </g>
  </g>

  <!-- Three "after" thumbnails on the right, vivid -->
  <g transform="translate(260 70)">
    <rect width="80" height="60" rx="6" fill="url(#brightCard2)" opacity="0.92" stroke="#34d399" stroke-opacity="0.5"/>
    <circle cx="40" cy="26" r="14" fill="#fde68a"/>
    <rect x="14" y="46" width="52" height="6" rx="3" fill="#fbbf24"/>
  </g>
  <g transform="translate(260 145)">
    <rect width="80" height="60" rx="6" fill="url(#brightCard)" opacity="0.92" stroke="#fcd34d" stroke-opacity="0.5"/>
    <rect x="12" y="12" width="56" height="34" rx="3" fill="#fed7aa"/>
    <line x1="18" y1="22" x2="62" y2="22" stroke="#7c2d12" stroke-width="1.4"/>
    <line x1="18" y1="32" x2="50" y2="32" stroke="#7c2d12" stroke-width="1.4"/>
  </g>

  <!-- Counter chip -->
  <g transform="translate(360 70)">
    <rect width="84" height="60" rx="8" fill="#0F172A" stroke="#334155"/>
    <text x="42" y="22" fill="#f59e0b" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" text-anchor="middle">QUEUED</text>
    <text x="42" y="42" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="800" text-anchor="middle">24</text>
    <text x="42" y="54" fill="#94a3b8" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" text-anchor="middle">images</text>
  </g>

  <g transform="translate(360 145)">
    <rect width="84" height="60" rx="8" fill="#0F172A" stroke="#10B981" stroke-opacity="0.3"/>
    <text x="42" y="22" fill="#34D399" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" text-anchor="middle">DONE</text>
    <text x="42" y="42" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="800" text-anchor="middle">8</text>
    <text x="42" y="54" fill="#94a3b8" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" text-anchor="middle">$0.32</text>
  </g>

  <!-- Label -->
  <text x="40" y="32" fill="#fcd34d" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">BATCH ENHANCER · NANO BANANA</text>
  <text x="40" y="50" fill="#fed7aa" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="500" letter-spacing="0.5" opacity="0.8">Interior · Product · Lifestyle · Restore · Architectural</text>
</svg>
