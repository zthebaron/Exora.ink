<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="Orders Dashboard thumbnail">
  <defs>
    <linearGradient id="ordbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#02211A"/>
    </linearGradient>
    <linearGradient id="rowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="240" fill="url(#ordbg)"/>
  <circle cx="100" cy="80" r="80" fill="#10B981" opacity="0.12"/>
  <circle cx="400" cy="180" r="100" fill="#34D399" opacity="0.08"/>

  <!-- Stats row at top -->
  <g transform="translate(30 30)">
    <rect width="100" height="36" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.3"/>
    <text x="10" y="14" fill="#6EE7B7" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">TODAY</text>
    <text x="10" y="28" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700">12 orders</text>

    <g transform="translate(110 0)">
      <rect width="100" height="36" rx="6" fill="#064E3B" stroke="#0EA5E9" stroke-opacity="0.3"/>
      <text x="10" y="14" fill="#7DD3FC" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">PROCESSING</text>
      <text x="10" y="28" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700">8</text>
    </g>

    <g transform="translate(220 0)">
      <rect width="100" height="36" rx="6" fill="#064E3B" stroke="#FB7185" stroke-opacity="0.3"/>
      <text x="10" y="14" fill="#FCA5A5" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">ON HOLD</text>
      <text x="10" y="28" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700">3</text>
    </g>

    <g transform="translate(330 0)">
      <rect width="100" height="36" rx="6" fill="#064E3B" stroke="#FBBF24" stroke-opacity="0.3"/>
      <text x="10" y="14" fill="#FCD34D" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">PENDING</text>
      <text x="10" y="28" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700">2</text>
    </g>
  </g>

  <!-- Order rows -->
  <g transform="translate(30 90)">
    <rect width="420" height="38" rx="6" fill="url(#rowGrad)" stroke="#10B981" stroke-opacity="0.2"/>
    <text x="14" y="22" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600">#1248</text>
    <text x="14" y="32" fill="#86efac" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" opacity="0.6">8 minutes ago</text>
    <text x="80" y="24" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" font-weight="500">Sarah Mitchell · 3 items</text>
    <rect x="290" y="12" width="64" height="14" rx="7" fill="#0EA5E9" opacity="0.3"/>
    <text x="322" y="22" fill="#7DD3FC" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="700" text-anchor="middle">PROCESSING</text>
    <text x="406" y="24" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="end">$87.00</text>
  </g>

  <g transform="translate(30 134)">
    <rect width="420" height="38" rx="6" fill="url(#rowGrad)" stroke="#10B981" stroke-opacity="0.2"/>
    <text x="14" y="22" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600">#1247</text>
    <text x="14" y="32" fill="#86efac" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" opacity="0.6">21 minutes ago</text>
    <text x="80" y="24" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" font-weight="500">J. Benton Construction · 100 items</text>
    <rect x="288" y="12" width="68" height="14" rx="7" fill="#10B981" opacity="0.3"/>
    <text x="322" y="22" fill="#6EE7B7" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="700" text-anchor="middle">COMPLETED</text>
    <text x="406" y="24" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="end">$639.00</text>
  </g>

  <g transform="translate(30 178)">
    <rect width="420" height="38" rx="6" fill="url(#rowGrad)" stroke="#10B981" stroke-opacity="0.2"/>
    <text x="14" y="22" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600">#1246</text>
    <text x="14" y="32" fill="#86efac" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" opacity="0.6">2 hours ago</text>
    <text x="80" y="24" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" font-weight="500">Atlas Hockey Club · 24 items</text>
    <rect x="295" y="12" width="56" height="14" rx="7" fill="#FBBF24" opacity="0.3"/>
    <text x="322" y="22" fill="#FCD34D" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8" font-weight="700" text-anchor="middle">PENDING</text>
    <text x="406" y="24" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="end">$192.00</text>
  </g>

  <text x="30" y="232" fill="#86efac" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" opacity="0.7">PRODUCTION ORDERS · LIVE FROM EXORA.INK</text>
</svg>
