<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="Custom Orders thumbnail">
  <defs>
    <linearGradient id="custbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#031a2a"/>
    </linearGradient>
    <linearGradient id="rowGradC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="480" height="240" fill="url(#custbg)"/>
  <circle cx="380" cy="60" r="80" fill="#0EA5E9" opacity="0.15"/>
  <circle cx="80" cy="200" r="100" fill="#38BDF8" opacity="0.10"/>

  <!-- Receipt / clipboard motif on the left -->
  <g transform="translate(40 50)">
    <rect width="140" height="160" rx="10" fill="#0C4A6E" stroke="#0EA5E9" stroke-opacity="0.4"/>
    <!-- Clip header -->
    <rect x="40" y="-8" width="60" height="18" rx="4" fill="#0EA5E9"/>
    <rect x="46" y="-4" width="48" height="10" rx="2" fill="#0C4A6E"/>
    <!-- Lines -->
    <rect x="14" y="20" width="100" height="6" rx="2" fill="#7DD3FC" opacity="0.6"/>
    <rect x="14" y="34" width="80" height="5" rx="2" fill="#7DD3FC" opacity="0.4"/>
    <rect x="14" y="46" width="112" height="5" rx="2" fill="#7DD3FC" opacity="0.4"/>

    <!-- Item rows -->
    <line x1="10" y1="64" x2="130" y2="64" stroke="#0EA5E9" stroke-opacity="0.3"/>
    <text x="14" y="80" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" opacity="0.85">Tee × 24</text>
    <text x="126" y="80" fill="#ffffff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" text-anchor="end">$192</text>
    <text x="14" y="96" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" opacity="0.85">Setup</text>
    <text x="126" y="96" fill="#ffffff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" text-anchor="end">$30</text>
    <text x="14" y="112" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" opacity="0.85">Rush fee</text>
    <text x="126" y="112" fill="#ffffff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" text-anchor="end">$45</text>

    <line x1="10" y1="124" x2="130" y2="124" stroke="#0EA5E9" stroke-opacity="0.3"/>
    <text x="14" y="142" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" font-weight="700">TOTAL</text>
    <text x="126" y="142" fill="#FBBF24" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="800" text-anchor="end">$267</text>
  </g>

  <!-- New Order CTA pill on the right -->
  <g transform="translate(220 70)">
    <rect width="220" height="40" rx="20" fill="#0EA5E9"/>
    <circle cx="20" cy="20" r="10" fill="#0C4A6E"/>
    <path d="M16 20 L24 20 M20 16 L20 24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="42" y="25" fill="white" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="700">NEW MANUAL ORDER</text>
  </g>

  <!-- Status chips -->
  <g transform="translate(220 130)">
    <rect width="84" height="22" rx="11" fill="#FBBF24" opacity="0.25"/>
    <text x="42" y="15" fill="#FCD34D" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PENDING</text>

    <g transform="translate(94 0)">
      <rect width="100" height="22" rx="11" fill="#0EA5E9" opacity="0.25"/>
      <text x="50" y="15" fill="#7DD3FC" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PROCESSING</text>
    </g>
  </g>

  <g transform="translate(220 162)">
    <rect width="220" height="44" rx="6" fill="url(#rowGradC)" stroke="#0EA5E9" stroke-opacity="0.3"/>
    <text x="14" y="20" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">C-1042</text>
    <text x="14" y="34" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10">Walk-in · Atlas Hockey · 3 items</text>
    <text x="206" y="28" fill="#FBBF24" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="800" text-anchor="end">$267</text>
  </g>

  <!-- Label -->
  <text x="40" y="28" fill="#7DD3FC" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">CUSTOM ORDERS · MANUAL ENTRY</text>
</svg>
