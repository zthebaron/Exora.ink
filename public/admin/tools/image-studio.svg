<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="Image Studio thumbnail">
  <defs>
    <linearGradient id="studiobg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#1f1203"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
    <linearGradient id="brushstroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="240" fill="url(#studiobg)"/>

  <!-- Decorative glows -->
  <circle cx="90" cy="180" r="80" fill="#F59E0B" opacity="0.15"/>
  <circle cx="420" cy="60" r="100" fill="#FF00FF" opacity="0.12"/>

  <!-- Prompt card (left) -->
  <g transform="translate(30 55)">
    <rect width="170" height="140" rx="12" fill="#1c1308" stroke="#F59E0B" stroke-opacity="0.3"/>
    <rect x="14" y="18" width="110" height="8" rx="4" fill="#F59E0B" opacity="0.9"/>
    <rect x="14" y="36" width="140" height="6" rx="3" fill="#fbbf24" opacity="0.5"/>
    <rect x="14" y="50" width="128" height="6" rx="3" fill="#fbbf24" opacity="0.5"/>
    <rect x="14" y="64" width="96" height="6" rx="3" fill="#fbbf24" opacity="0.5"/>
    <rect x="14" y="78" width="120" height="6" rx="3" fill="#fbbf24" opacity="0.5"/>
    <!-- magenta badge (chroma key) -->
    <g transform="translate(14 104)">
      <rect width="70" height="22" rx="11" fill="#FF00FF"/>
      <text x="35" y="15" text-anchor="middle" fill="#1c1308" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="700">#FF00FF</text>
    </g>
  </g>

  <!-- Sparkle / arrow -->
  <g transform="translate(225 120)">
    <circle r="24" fill="#F59E0B"/>
    <path d="M0 -10 L2 -2 L10 0 L2 2 L0 10 L-2 2 L-10 0 L-2 -2 Z" fill="#1c1308"/>
    <circle cx="-16" cy="-16" r="3" fill="#F59E0B"/>
    <circle cx="18" cy="16" r="2.5" fill="#F59E0B"/>
    <circle cx="20" cy="-14" r="2" fill="#F59E0B"/>
  </g>

  <!-- Canvas (right) with generated artwork on magenta chroma-key -->
  <g transform="translate(270 45)">
    <rect width="180" height="160" rx="12" fill="url(#canvas)"/>
    <!-- Abstract artwork: a stylized "E" mark -->
    <g transform="translate(90 80)">
      <!-- Bold shape -->
      <path d="M-36 -36 L30 -36 L30 -22 L-20 -22 L-20 -6 L18 -6 L18 8 L-20 8 L-20 22 L32 22 L32 36 L-36 36 Z" fill="#0f172a"/>
      <path d="M-36 -36 L30 -36 L30 -22 L-20 -22 L-20 -6 L18 -6 L18 8 L-20 8 L-20 22 L32 22 L32 36 L-36 36 Z"
        fill="none" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.8"/>
    </g>
    <!-- Brushstroke accent -->
    <rect x="20" y="124" width="100" height="12" rx="6" fill="url(#brushstroke)" opacity="0.75"/>
    <!-- Corner tag -->
    <circle cx="158" cy="22" r="10" fill="#0f172a"/>
    <circle cx="158" cy="22" r="5" fill="#F59E0B"/>
  </g>

  <!-- Label -->
  <text x="30" y="28" fill="#fbbf24" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">IMAGE STUDIO · NANO BANANA</text>
</svg>
