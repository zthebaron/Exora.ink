<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="Social Poster thumbnail">
  <defs>
    <linearGradient id="spbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F0A2A"/>
      <stop offset="100%" stop-color="#1B0314"/>
    </linearGradient>
    <linearGradient id="instagramGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#feda75"/>
      <stop offset="50%" stop-color="#d62976"/>
      <stop offset="100%" stop-color="#4f5bd5"/>
    </linearGradient>
  </defs>

  <rect width="480" height="240" fill="url(#spbg)"/>
  <circle cx="100" cy="60" r="80" fill="#0EA5E9" opacity="0.10"/>
  <circle cx="380" cy="180" r="100" fill="#F43F5E" opacity="0.12"/>

  <!-- Compose card on the left -->
  <g transform="translate(40 50)">
    <rect width="170" height="140" rx="10" fill="#0F172A" stroke="#475569"/>
    <circle cx="14" cy="14" r="3" fill="#f43f5e"/>
    <circle cx="22" cy="14" r="3" fill="#f59e0b"/>
    <circle cx="30" cy="14" r="3" fill="#10b981"/>
    <line x1="0" y1="22" x2="170" y2="22" stroke="#1e293b"/>
    <rect x="14" y="32" width="142" height="6" rx="2" fill="#cbd5e1" opacity="0.7"/>
    <rect x="14" y="44" width="120" height="6" rx="2" fill="#cbd5e1" opacity="0.5"/>
    <rect x="14" y="56" width="138" height="6" rx="2" fill="#cbd5e1" opacity="0.5"/>
    <rect x="14" y="68" width="90" height="6" rx="2" fill="#cbd5e1" opacity="0.5"/>
    <rect x="14" y="86" width="40" height="40" rx="6" fill="#475569"/>
    <rect x="60" y="86" width="40" height="40" rx="6" fill="#334155"/>
  </g>

  <!-- Platform logos on the right (FB, IG, LinkedIn, Pinterest) -->
  <g transform="translate(245 60)">
    <!-- Facebook -->
    <g transform="translate(0 0)">
      <circle cx="22" cy="22" r="22" fill="#1877F2"/>
      <path d="M28 14h-3a2 2 0 0 0-2 2v3h-3v3h3v9h3v-9h3l1-3h-4v-2c0-.6.4-1 1-1h3v-2z" fill="#ffffff"/>
    </g>
    <!-- Instagram -->
    <g transform="translate(54 0)">
      <rect width="44" height="44" rx="11" fill="url(#instagramGrad)"/>
      <rect x="11" y="11" width="22" height="22" rx="6" fill="none" stroke="#ffffff" stroke-width="2.4"/>
      <circle cx="22" cy="22" r="5" fill="none" stroke="#ffffff" stroke-width="2.4"/>
      <circle cx="29.5" cy="14.5" r="1.4" fill="#ffffff"/>
    </g>
    <!-- LinkedIn -->
    <g transform="translate(108 0)">
      <rect width="44" height="44" rx="6" fill="#0A66C2"/>
      <rect x="10" y="18" width="6" height="18" fill="#ffffff"/>
      <circle cx="13" cy="13" r="3" fill="#ffffff"/>
      <path d="M20 18h6v3c1-2 3-3 5-3s5 2 5 5v13h-6v-12c0-1-1-2-2-2s-2 1-2 2v12h-6z" fill="#ffffff"/>
    </g>

    <!-- Pinterest below -->
    <g transform="translate(0 56)">
      <circle cx="22" cy="22" r="22" fill="#E60023"/>
      <path d="M22 8c-7 0-13 6-13 13 0 5 3 10 7 12-.1-1.1-.2-2.6.1-3.7l1.6-7s-.4-.8-.4-2c0-1.9 1.1-3.3 2.5-3.3 1.2 0 1.8.9 1.8 2 0 1.2-.8 3-1.2 4.7-.3 1.4.7 2.6 2.1 2.6 2.5 0 4.5-2.7 4.5-6.5 0-3.4-2.5-5.8-6-5.8-4.1 0-6.5 3.1-6.5 6.3 0 1.2.5 2.6 1.1 3.3.1.2.1.3.1.5l-.4 1.5c-.1.3-.2.4-.5.2-1.6-.7-2.6-3.1-2.6-5 0-4.1 3-7.8 8.6-7.8 4.5 0 8 3.2 8 7.5 0 4.5-2.8 8.1-6.8 8.1-1.3 0-2.6-.7-3-1.5l-.8 3.2c-.3 1.1-1.1 2.6-1.6 3.4 1.2.4 2.5.6 3.8.6 7 0 13-6 13-13s-6-13-13-13z" fill="#ffffff"/>
    </g>

    <!-- Send / paper plane on the right -->
    <g transform="translate(160 30)">
      <circle r="36" fill="#F43F5E"/>
      <path d="M-14 0 L14 -10 L8 0 L14 10 Z M-14 0 L8 0" stroke="#ffffff" stroke-width="2" fill="#ffffff" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Label -->
  <text x="40" y="32" fill="#fda4af" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">SOCIAL POSTER · MULTI-PLATFORM</text>
  <text x="40" y="216" fill="#fecdd3" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="500" letter-spacing="0.5" opacity="0.7">Compose · target accounts · post now or schedule</text>
</svg>
